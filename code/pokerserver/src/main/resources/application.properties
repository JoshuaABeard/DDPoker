# Standalone poker game server configuration

# App details (used by ConfigManager)
app.name=poker

# Database configuration - defaults to H2 embedded, override with environment variables
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/poker;MODE=MySQL;AUTO_SERVER=TRUE;INIT=RUNSCRIPT FROM 'classpath:h2-init.sql'}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable Spring Boot banner
spring.main.banner-mode=off

# Game discovery / cleanup settings
game.server.community-heartbeat-timeout-minutes=5
game.server.lobby-timeout-hours=24
game.server.completed-game-retention-days=7

# Publicly reachable WebSocket base URL for SERVER-hosted games.
# Clients use this URL to connect to games created on this server.
# Override per deployment (e.g. wss://play.ddpoker.com).
game.server.base-url=ws://localhost
