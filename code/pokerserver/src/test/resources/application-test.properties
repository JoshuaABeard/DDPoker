# Test-specific database configuration (H2 in-memory, MySQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:pokertest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# Disable web server for tests (not needed for service-layer tests)
spring.main.web-application-type=none
