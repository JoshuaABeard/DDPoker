# Email — maps existing Docker SMTP_* env vars to Spring Boot Mail
# When SMTP_HOST is not set, JavaMailSender bean is not created (EmailService falls back to logging)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}

# From address and base URL for email links (reuses existing Docker env vars)
app.email.from=${SMTP_FROM:noreply@ddpoker.com}
app.base-url=${SERVER_HOST:localhost}

# CORS - allowed browser origins (comma-separated); also allows https://${app.base-url} automatically
# In production, set CORS_ALLOWED_ORIGINS to include your web client origin if it differs from SERVER_HOST
game.server.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
